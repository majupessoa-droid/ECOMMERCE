function Ball({className="w-12 h-12 text-navy/25"}){
  return (<svg viewBox="0 0 48 48" className={className} fill="none" stroke="currentColor" strokeWidth="2">
    <circle cx="24" cy="24" r="20"/><path d="M4 24h40M24 4v40M9 9c8 6 8 24 0 30M39 9c-8 6-8 24 0 30"/></svg>);
}
function ProdImg({src,alt,className="w-full h-full object-contain"}){
  const [err,setErr]=useState(false);
  if(!src||err) return <Ball/>;
  return <img src={src} alt={alt} loading="lazy" onError={()=>setErr(true)} className={className}/>;
}
function Carousel({images}){
  const [i,setI]=useState(0);
  const [paused,setPaused]=useState(false);
  const multi = images.length>1;
  useEffect(()=>{ if(paused||!multi) return; const t=setInterval(()=>setI(p=>(p+1)%images.length),3500); return ()=>clearInterval(t); },[images.length,paused,multi]);
  const prev=()=>setI(p=>(p-1+images.length)%images.length);
  const next=()=>setI(p=>(p+1)%images.length);
  return (
    <div className="relative bg-white rounded-2xl overflow-hidden shadow-2xl shadow-black/30" onMouseEnter={()=>setPaused(true)} onMouseLeave={()=>setPaused(false)}>
      <div className="relative aspect-[1580/450] overflow-hidden">
        {images.map((src,idx)=>(
          <img key={idx} src={src} alt="" loading="lazy"
            className={"absolute inset-0 w-full h-full object-cover transition-opacity duration-700 "+(idx===i?"opacity-100":"opacity-0")}/>
        ))}
        {multi && <button onClick={prev} aria-label="Anterior" className="absolute left-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/85 hover:bg-white grid place-items-center text-navy text-lg shadow">‹</button>}
        {multi && <button onClick={next} aria-label="Próximo" className="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-white/85 hover:bg-white grid place-items-center text-navy text-lg shadow">›</button>}
      </div>
      {multi && <div className="absolute bottom-3 left-0 right-0 flex justify-center gap-1.5">
        {images.map((_,idx)=>(<button key={idx} onClick={()=>setI(idx)} aria-label={"Slide "+(idx+1)} className={"h-1.5 rounded-full transition-all "+(idx===i?"w-6 bg-white":"w-1.5 bg-white/60 hover:bg-white")}/>))}
      </div>}
    </div>
  );
}

function FakeQR(){
  const N=25,size=200,cell=size/N; let h=987;
  const rand=()=>((h=(h*1103515245+12345)&0x7fffffff)/0x7fffffff);
  const fnd=(r,c)=>{const b=(br,bc)=>r>=br&&r<br+7&&c>=bc&&c<bc+7&&!(r>br+1&&r<br+5&&c>bc+1&&c<bc+5&&!(r>br+2&&r<br+4&&c>bc+2&&c<bc+4));return b(0,0)||b(0,N-7)||b(N-7,0);};
  const res=(r,c)=>(r<8&&c<8)||(r<8&&c>=N-8)||(r>=N-8&&c<8);
  const cells=[];for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(fnd(r,c)||(!res(r,c)&&rand()>0.5))cells.push(<rect key={r+"-"+c} x={c*cell} y={r*cell} width={cell} height={cell}/>);}
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="mx-auto my-6 rounded-xl bg-white p-3 border border-line"><g fill="#0C1424">{cells}</g></svg>;
}

  const [query,setQuery]=useState("");
  const [unit,setUnit]=useState(null);

  const add=(it)=>{setItems(s=>{const ex=s.find(i=>i.key===it.key);return ex?s.map(i=>i.key===it.key?{...i,qty:i.qty+it.qty}:i):[...s,it];});setOpen(true);};
  const setQty=(k,q)=>setItems(s=>s.map(i=>i.key===k?{...i,qty:Math.max(1,q)}:i));
  const remove=(k)=>setItems(s=>s.filter(i=>i.key!==k));
  const clear=()=>setItems([]);
  const count=items.reduce((t,i)=>t+i.qty,0);

  const parts=hash.replace(/^#\//,"").split("/");
  let view;
  if(parts[0]==="") view=<Home/>;
  else if(parts[0]==="c") view=<Category pillar={parts[1]}/>;
  else if(parts[0]==="p") view=<Product slug={parts[1]} onAdd={add}/>;
  else if(parts[0]==="checkout") view=<Checkout items={items} clear={clear}/>;
  else if(parts[0]==="unidade") view = unit ? <UnitView unit={unit} onChange={()=>setUnit(null)}/> : <UnitFinder onPick={(u)=>setUnit(u)}/>;
  else view=<Home/>;

  return (
    <div className="min-h-screen">
      <Header count={count} onCart={()=>setOpen(true)} query={query} setQuery={setQuery}/>
      <CartDrawer open={open} items={items} onClose={()=>setOpen(false)} setQty={setQty} remove={remove}/>
      <SizeChartModal/>
      <main className="pb-20">{view}</main>
      <footer className="bg-navy text-white/70 text-sm">
        <div className="max-w-6xl mx-auto px-5 py-10 grid sm:grid-cols-3 gap-8">
          <div><Logo onDark/><p className="mt-3">Loja oficial das unidades NBA Basketball School no Brasil.</p></div>
          <div><p className="font-700 text-white mb-2">Categorias</p>{pillars.map(p=>(<a key={p.slug} href={`#/c/${p.slug}`} className="block hover:text-white">{p.name}</a>))}</div>
          <div><p className="font-700 text-white mb-2">Atendimento</p><a href="https://wa.me/5511991796984" className="block hover:text-white">WhatsApp</a><a href="#/unidade" className="block hover:text-white">Encontrar unidade</a><span className="block">Frete grátis para a rede</span></div>
        </div>
        <div className="border-t border-white/10 py-4 text-center text-xs">Demonstração · redesign conceitual — NBA Basketball School Unidades</div>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
